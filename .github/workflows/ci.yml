name: CI/CD Pipeline

on:
  push:
    branches: [ main, Hiruni* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build Docker images
        run: |
          docker compose build

      - name: Run containers
        run: |
          docker compose up -d

      - name: Health check backend
        run: |
          sleep 10
          curl http://localhost:3000